name: Actualizar datos SEC + Clima

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml

      - name: Forzar actualizacion
        run: echo '{}' > data/last_sync.json

      - name: Ejecutar scraper
        run: python extractor/scraper.py

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sec.json data/clima.json data/last_sync.json
          git diff --staged --quiet && echo "Sin cambios" || (git commit -m "auto: SEC + clima $(date -u '+%d/%m/%Y %H:%M UTC')" && git push)
